<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Foundation Guard</title>
    <!-- Matter.js Physics Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script type="module" crossorigin src="/new-pacman/assets/index-D_y83gFD.js"></script>
  <link rel="stylesheet" crossorigin href="/new-pacman/assets/index-CFTaffHN.css">
</head>
<body>
    <div id="app-container">
        <div id="ui-layout">
            <div id="ui-overlay">
                <div id="top-bar">
                <div class="stat-box">
                    <span class="label">MAZE INTEGRITY</span>
                    <div class="progress-container">
                        <div id="maze-health-bar" class="progress-fill" style="width: 100%;"></div>
                    </div>
                    <span id="maze-health-text">100%</span>
                </div>
                
                <div class="stat-box">
                    <span class="label">INSURANCE STRIKES</span>
                    <div id="strikes-container">
                        <div class="strike"></div>
                        <div class="strike"></div>
                        <div class="strike"></div>
                    </div>
                </div>
                
                <div class="stat-box">
                    <span class="label">LEVEL</span>
                    <span id="level-display">1 / 10</span>
                </div>
            </div>

            <div id="player-status">
                <div class="health-container">
                    <div id="player-health-bar" class="progress-fill" style="width: 100%;"></div>
                </div>
            </div>

            <!-- HUD Buttons -->
            <div id="hud-buttons">
                <button id="btn-mute" class="hud-btn" title="Toggle Sound">&#x1f50a;</button>
                <button id="btn-pause" class="hud-btn" title="Pause">&#x23f8;</button>
            </div>

            <!-- Mobile Touch Controls -->
            <div id="mobile-controls" class="hidden">
                <div class="dpad">
                    <button id="btn-up" class="joy-btn dpad-up">&#x25b2;</button>
                    <div class="dpad-row">
                        <button id="btn-left" class="joy-btn">&#x25c0;</button>
                        <button id="btn-right" class="joy-btn">&#x25b6;</button>
                    </div>
                    <button id="btn-down" class="joy-btn dpad-down">&#x25bc;</button>
                </div>
                <div class="actions">
                    <button id="btn-punch" class="joy-btn punch">P</button>
                    <button id="btn-kick" class="joy-btn kick">K</button>
                </div>
            </div>
        </div>

        <div id="game-wrapper">
            <div id="game-container">
                <canvas id="gameCanvas"></canvas>

                <div id="pause-overlay" class="hidden">
                    <div id="pause-modal">
                <h1>PAUSED</h1>
                <button id="resume-btn" class="modal-btn">RESUME</button>
                <button id="quit-btn" class="modal-btn">QUIT</button>
            </div>
        </div>

        <div id="modal-container" class="hidden">
            <div id="game-modal">
                <h1 id="modal-title">TERMINATION NOTICE</h1>
                <p id="modal-message">You have failed to protect the foundation. Your contract is terminated.</p>
                <button id="modal-action">RETRY</button>
            </div>
        </div>
        
                <div id="senior-contractor-unlock" class="hidden">
                    <h2>UNLOCKED: SENIOR CONTRACTOR MODE</h2>
                    <p>The hard way begins.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Engine via Vite -->
</body>
</html>
